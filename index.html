<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>BT21 Selfie Cam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Nunito:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a0a2e;
      --accent: #9b59d0;
      --accent2: #c084fc;
      --text: #f5f0ff;
      --muted: #9980b8;
      --flash: rgba(255,255,255,0.95);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      touch-action: none;
    }

    /* ── VIDEO LAYER ── */
    #video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }

    /* ── OVERLAY ── */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top, 16px) 0 env(safe-area-inset-bottom, 16px);
      pointer-events: none;
      z-index: 10;
    }

    /* ── TOP BAR ── */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 12px 18px;
      pointer-events: all;
    }

    .logo {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.2rem;
      color: #fff;
      letter-spacing: 0.03em;
      text-shadow: 0 2px 10px rgba(0,0,0,0.7);
    }

    #counter-display {
      font-size: 0.72rem;
      color: #fff;
      letter-spacing: 0.1em;
      background: rgba(155, 89, 208, 0.7);
      padding: 4px 12px;
      border-radius: 20px;
      border: 1.5px solid rgba(192, 132, 252, 0.5);
      text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
    }

    /* ── BT21 FRAME IMAGE ── */
    #frame-wrap {
      position: relative;
      width: min(96vw, 600px);
      aspect-ratio: 3 / 4;
      flex-shrink: 0;
      pointer-events: none;
    }

    #bt21-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
      z-index: 2;
    }

    /* ── BOTTOM CONTROLS ── */
    #controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 36px;
      width: 100%;
      padding: 0 28px 8px;
      pointer-events: all;
    }

    #flip-btn {
      width: 50px; height: 50px;
      border-radius: 50%;
      background: rgba(155, 89, 208, 0.5);
      border: 1.5px solid rgba(192, 132, 252, 0.5);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background 0.2s, transform 0.2s;
    }
    #flip-btn:active { background: rgba(192,132,252,0.5); transform: scale(0.9) rotate(30deg); }
    #flip-btn svg { width: 22px; height: 22px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; }

    #shutter {
      width: 78px; height: 78px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #d8aaff, #9b59d0);
      border: 4px solid rgba(255,255,255,0.4);
      box-shadow: 0 0 0 3px rgba(155,89,208,0.4), 0 8px 28px rgba(0,0,0,0.5);
      cursor: pointer;
      position: relative;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    #shutter::after {
      content: '';
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: opacity 0.12s;
    }
    #shutter:active { transform: scale(0.91); box-shadow: 0 0 0 6px rgba(155,89,208,0.4), 0 4px 14px rgba(0,0,0,0.5); }
    #shutter.disabled { opacity: 0.4; cursor: default; }

    .ctrl-spacer { width: 50px; }

    /* ── FLASH ── */
    #flash {
      position: fixed; inset: 0; z-index: 100;
      background: var(--flash);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.05s ease-in;
    }
    #flash.go   { opacity: 1; transition: none; }
    #flash.fade { opacity: 0; transition: opacity 0.35s ease-out; }

    /* ── PERMISSION SCREEN ── */
    #perm-screen {
      position: fixed; inset: 0; z-index: 50;
      background: linear-gradient(160deg, #1a0a2e 0%, #2d0f5a 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 22px;
      padding: 40px;
      text-align: center;
    }

    #perm-frame-preview {
      width: 140px;
      opacity: 0.92;
      filter: drop-shadow(0 6px 20px rgba(155,89,208,0.6));
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-8px); }
    }

    #perm-screen h1 {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 2rem;
      color: #fff;
      text-shadow: 0 0 24px rgba(192,132,252,0.7);
    }
    #perm-screen p { color: var(--muted); font-size: 0.88rem; line-height: 1.75; max-width: 280px; }

    #start-btn {
      margin-top: 6px;
      padding: 14px 40px;
      border-radius: 40px;
      background: linear-gradient(135deg, #9b59d0, #c084fc);
      border: none;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(155,89,208,0.5);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #start-btn:active { transform: scale(0.95); box-shadow: 0 2px 10px rgba(155,89,208,0.4); }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 105px);
      left: 50%; transform: translateX(-50%);
      background: rgba(26,10,46,0.92);
      border: 1px solid rgba(192,132,252,0.4);
      color: #c084fc;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      padding: 8px 20px;
      border-radius: 30px;
      z-index: 200;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    #error-msg {
      position: fixed;
      bottom: 120px;
      left: 0; right: 0;
      text-align: center;
      color: #e07070;
      font-size: 0.8rem;
      padding: 0 24px;
      z-index: 40;
    }
  </style>
</head>
<body>

<!-- Permission / start screen -->
<div id="perm-screen">
  <img id="perm-frame-preview" src="BT21frame.png" alt="BT21 frame preview" />
  <h1>BT21 Selfie Cam</h1>
  <p>Take a selfie with the BT21 frame! 💜</p>
  <button id="start-btn">📸 OPEN CAMERA</button>
</div>

<!-- Live camera feed -->
<video id="video" autoplay playsinline muted></video>

<!-- UI overlay -->
<div id="overlay">
  <div id="topbar">
    <span class="logo">💜 BT21</span>
    <span id="counter-display">PHOTO #<span id="photo-num">1</span></span>
  </div>

  <!-- BT21 frame sits over the live video -->
  <div id="frame-wrap">
    <img id="bt21-frame" src="BT21frame.png" alt="BT21 photo frame" crossorigin="anonymous" />
  </div>

  <div id="controls">
    <button id="flip-btn" title="Flip camera">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M1 4v6h6" /><path d="M23 20v-6h-6"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
    </button>
    <button id="shutter" title="Take photo" class="disabled"></button>
    <div class="ctrl-spacer"></div>
  </div>
</div>

<!-- Hidden canvas for capture -->
<canvas id="canvas" style="display:none"></canvas>
<!-- Hidden img element used for canvas compositing -->
<img id="frame-img" src="BT21frame.png" alt="" crossorigin="anonymous" style="display:none" />

<!-- Flash overlay -->
<div id="flash"></div>

<!-- Toast notification -->
<div id="toast"></div>

<!-- Error message -->
<div id="error-msg"></div>

<script>
  const video      = document.getElementById('video');
  const canvas     = document.getElementById('canvas');
  const frameImg   = document.getElementById('frame-img');
  const shutter    = document.getElementById('shutter');
  const flipBtn    = document.getElementById('flip-btn');
  const flash      = document.getElementById('flash');
  const toast      = document.getElementById('toast');
  const permScreen = document.getElementById('perm-screen');
  const startBtn   = document.getElementById('start-btn');
  const photoNum   = document.getElementById('photo-num');
  const errorMsg   = document.getElementById('error-msg');
  const overlay    = document.getElementById('overlay');

  const BASE_NAME  = 'BT21-selfie';
  let photoCount   = 1;
  let facingMode   = 'user';
  let stream       = null;
  let shooting     = false;

  function updateCounter() {
    photoNum.textContent = photoCount;
  }

  let toastTimer;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
  }

  async function startCamera(facing = 'user') {
    if (stream) stream.getTracks().forEach(t => t.stop());
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: facing }, width: { ideal: 1920 }, height: { ideal: 1080 } },
        audio: false
      });
      video.srcObject = stream;
      video.style.transform = facing === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
      await video.play();
      shutter.classList.remove('disabled');
      errorMsg.textContent = '';
    } catch (err) {
      console.error(err);
      errorMsg.textContent = '⚠ Camera error: ' + (err.message || err);
    }
  }

  startBtn.addEventListener('click', async () => {
    startBtn.textContent = 'OPENING...';
    startBtn.disabled = true;
    await startCamera(facingMode);
    if (stream) {
      permScreen.style.display = 'none';
      overlay.style.display = 'flex';
    } else {
      startBtn.textContent = 'TRY AGAIN';
      startBtn.disabled = false;
    }
  });

  flipBtn.addEventListener('click', () => {
    facingMode = facingMode === 'user' ? 'environment' : 'user';
    startCamera(facingMode);
  });

  shutter.addEventListener('click', () => {
    if (shooting || shutter.classList.contains('disabled')) return;
    shooting = true;

    // Flash effect
    flash.classList.add('go');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      flash.classList.remove('go');
      flash.classList.add('fade');
      flash.addEventListener('transitionend', () => flash.classList.remove('fade'), { once: true });
    }));

    const vw = video.videoWidth  || 640;
    const vh = video.videoHeight || 480;

    // Crop video to 3:4 portrait, centred
    const cropRatio = 3 / 4;
    let cropW, cropH, cropX, cropY;
    if (vw / vh > cropRatio) {
      cropH = vh;
      cropW = Math.round(vh * cropRatio);
      cropX = Math.round((vw - cropW) / 2);
      cropY = 0;
    } else {
      cropW = vw;
      cropH = Math.round(vw / cropRatio);
      cropX = 0;
      cropY = Math.round((vh - cropH) / 2);
    }

    canvas.width  = cropW;
    canvas.height = cropH;
    const ctx = canvas.getContext('2d');

    // 1. Draw video onto canvas (mirrored for front cam)
    if (facingMode === 'user') {
      ctx.save();
      ctx.translate(cropW, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
      ctx.restore();
    } else {
      ctx.drawImage(video, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);
    }

    // 2. Composite BT21 frame on top
    function drawFrameAndSave() {
      ctx.drawImage(frameImg, 0, 0, cropW, cropH);

      const filename = `${BASE_NAME}-${String(photoCount).padStart(3, '0')}.jpg`;
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const a   = document.createElement('a');
        a.href     = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 3000);

        showToast(`💜 Saved as ${filename}`);
        photoCount++;
        updateCounter();
        shooting = false;
      }, 'image/jpeg', 0.93);
    }

    if (frameImg.complete && frameImg.naturalWidth > 0) {
      drawFrameAndSave();
    } else {
      frameImg.onload = drawFrameAndSave;
    }
  });

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'Enter') shutter.click();
  });

  overlay.style.display = 'none';
  updateCounter();
</script>
</body>
</html>
